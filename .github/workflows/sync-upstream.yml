name: Sync Upstream

on:
  schedule:
    # 每24小时运行一次 (UTC 时间每天 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      synced: ${{ steps.check-sync.outputs.synced }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "celdrick"
          git config user.email "594596998@qq.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/vllm-project/vllm.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Check for changes
        id: check-sync
        run: |
          git checkout main
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "synced=true" >> $GITHUB_OUTPUT
            echo "Changes detected: local=$LOCAL, upstream=$UPSTREAM"
          else
            echo "synced=false" >> $GITHUB_OUTPUT
            echo "No changes to sync"
          fi

      - name: Merge upstream main
        if: steps.check-sync.outputs.synced == 'true'
        run: |
          git merge upstream/main --no-edit

      - name: Push changes
        if: steps.check-sync.outputs.synced == 'true'
        run: |
          git push origin main

  trigger-docker-build:
    needs: sync
    if: needs.sync.outputs.synced == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Docker Build
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build.yml',
              ref: 'main'
            });
            console.log('Docker build workflow triggered successfully');
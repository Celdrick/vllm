name: Sync Upstream

on:
  schedule:
    # 每24小时运行一次 (UTC 时间每天 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "celdrick"
          git config user.email "594596998@qq.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/vllm-project/vllm.git

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Merge upstream main
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push changes
        run: |
          git push origin main